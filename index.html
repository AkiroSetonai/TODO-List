<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="title">
        <h1>Gerenciador de Tarefas</h1>
        <h1>Pessoais</h1>
    </header>
    <main class="wrapper">
      <section class="container">

        <div id="category-list" class="left-column">
            <div class="title-left">
            <h2>Categorias</h2>
            </div>
            <div class="category-list">
                <button class="category" style="background-color: #4CAF50;">Completo</button>
                <button class="category" style="background-color: #FF5252;">Urgente</button>
                <button class="category" style="background-color: #FFC107;">Importante</button>
                <button class="category" style="background-color: #9C27B0;">Para depois</button>
                <button class="category" style="background-color: #26A7B8;">Para estudar</button>
            </div>
            <button class="add-button">Adicionar Categoria</button>
        </div>

        <div class="top-right">

        </div>
        <div class="bottom-right">

        </div>
      </section>
    </main>
  </body>
</html>
